<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentChecker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-brand">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>ContentChecker</span>
  </div>
  <div class="topbar-path">
    <input id="root-input" type="text" placeholder="Путь к папке, например: /Users/you/media" autocomplete="off" spellcheck="false">
    <button id="load-btn" class="btn-primary">Открыть</button>
  </div>
  <div class="topbar-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search-input" type="text" placeholder="Поиск по именам файлов..." autocomplete="off">
  </div>
</header>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" data-tab="browse">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    </svg>
    Просмотр
  </button>
  <button class="tab-btn" data-tab="favorites">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    Избранное
    <span class="tab-badge hidden" id="fav-badge">0</span>
  </button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-empty" id="sidebar-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      <p>Укажите путь к папке</p>
    </div>

    <div id="sidebar-content" class="hidden">
      <!-- Breadcrumbs -->
      <nav id="breadcrumbs" class="breadcrumbs"></nav>

      <!-- View mode -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Режим просмотра</div>
        <label class="toggle-label">
          <input type="checkbox" id="flat-toggle">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span>Всё в одном списке</span>
        </label>
      </div>

      <!-- Folder search -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Поиск по папкам</div>
        <div class="sidebar-search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="folder-search" type="text" placeholder="Название папки..." autocomplete="off">
          <button id="folder-search-clear" class="sidebar-clear-btn hidden">✕</button>
        </div>
      </div>

      <!-- Subfolders -->
      <div class="sidebar-section" id="subfolders-section">
        <div class="sidebar-section-title">Подпапки</div>
        <div id="subfolders-list"></div>
      </div>

      <!-- Best filters -->
      <div class="sidebar-section" id="best-section">
        <div class="sidebar-section-title">Избранные папки</div>
        <div class="star-filter-row">
          <button class="star-filter-btn" data-target="folder" data-level="0">Все</button>
          <button class="star-filter-btn" data-target="folder" data-level="1">★</button>
          <button class="star-filter-btn" data-target="folder" data-level="2">★★</button>
          <button class="star-filter-btn" data-target="folder" data-level="3">★★★</button>
        </div>
        <div class="sidebar-section-title" style="margin-top:10px">Избранные файлы</div>
        <div class="star-filter-row">
          <button class="star-filter-btn" data-target="file" data-level="0">Все</button>
          <button class="star-filter-btn" data-target="file" data-level="1">★</button>
          <button class="star-filter-btn" data-target="file" data-level="2">★★</button>
          <button class="star-filter-btn" data-target="file" data-level="3">★★★</button>
        </div>
      </div>

      <!-- Categories filter -->
      <div class="sidebar-section" id="categories-section">
        <div class="sidebar-section-title">
          Фильтр категорий
          <button class="btn-link" id="clear-cats">Сбросить</button>
        </div>
        <div class="sidebar-search-wrap" style="margin-bottom:8px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="cat-search" type="text" placeholder="Найти категорию..." autocomplete="off">
          <button id="cat-search-clear" class="sidebar-clear-btn hidden">✕</button>
        </div>
        <div id="categories-list"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-info">
        <span id="result-count"></span>
      </div>
      <div class="toolbar-actions">
        <!-- Media filter -->
        <div class="media-filter-btns" id="media-filter-btns">
          <button class="media-filter-btn active" data-filter="all">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Все
          </button>
          <button class="media-filter-btn" data-filter="videos">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polygon points="10 9 15 12 10 15"/>
            </svg>
            Видео
          </button>
          <button class="media-filter-btn" data-filter="photos">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            Фото
          </button>
        </div>
        <!-- Photo controls (photos mode only) -->
        <div id="photo-controls" class="photo-controls hidden">
          <div class="view-buttons">
            <button class="size-btn view-btn" data-size="small" title="Мелкие">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="4" height="4" rx="0.5"/><rect x="10" y="3" width="4" height="4" rx="0.5"/>
                <rect x="17" y="3" width="4" height="4" rx="0.5"/><rect x="3" y="10" width="4" height="4" rx="0.5"/>
                <rect x="10" y="10" width="4" height="4" rx="0.5"/><rect x="17" y="10" width="4" height="4" rx="0.5"/>
                <rect x="3" y="17" width="4" height="4" rx="0.5"/><rect x="10" y="17" width="4" height="4" rx="0.5"/>
                <rect x="17" y="17" width="4" height="4" rx="0.5"/>
              </svg>
            </button>
            <button class="size-btn view-btn active" data-size="medium" title="Средние">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/>
                <rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/>
              </svg>
            </button>
            <button class="size-btn view-btn" data-size="large" title="Крупные">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
              </svg>
            </button>
          </div>
          <button class="ratio-btn" id="ratio-btn" title="Переключить соотношение сторон">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="5" width="18" height="14" rx="1.5"/>
            </svg>
            <span id="ratio-label">1:1</span>
          </button>
        </div>

        <button id="clear-cache-btn" class="ratio-btn" title="Удалить кеш превью (пересоздать в высоком качестве)" style="display:none">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          Сбросить кеш
        </button>

        <!-- Grid/List (only in "all" mode) -->
        <div class="view-buttons" id="view-mode-btns">
          <button id="btn-grid" class="view-btn active" title="Сетка">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </button>
          <button id="btn-list" class="view-btn" title="Список">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Content area -->
    <div id="content-area">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
        </div>
        <h2>Добро пожаловать в ContentChecker</h2>
        <p>Введите путь к папке с медиафайлами выше, чтобы начать просмотр</p>
      </div>
      <div id="folders-container" class="folders-grid hidden"></div>
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Загрузка...</p>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Ничего не найдено</p>
      </div>
    </div>

    <!-- FAVORITES PAGE -->
    <div id="fav-area" class="hidden">
      <div class="fav-toolbar">
        <div class="fav-level-tabs">
          <button class="fav-level-btn active" data-level="1">★ Все</button>
          <button class="fav-level-btn" data-level="1" data-exact="1">★ 1 звезда</button>
          <button class="fav-level-btn" data-level="2" data-exact="2">★★ 2 звезды</button>
          <button class="fav-level-btn" data-level="3" data-exact="3">★★★ 3 звезды</button>
        </div>
        <span id="fav-count" class="toolbar-info"></span>
      </div>
      <div id="fav-content"></div>
    </div>
  </main>
</div>

<!-- PREVIEW MODAL -->
<div id="modal" class="modal hidden" role="dialog">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-window">
    <div class="modal-header">
      <span id="modal-title" class="modal-title"></span>
      <div class="modal-actions">
        <button id="modal-open" class="btn-icon" title="Открыть расположение">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </button>
        <button id="modal-close" class="btn-icon" title="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div class="modal-nav hidden" id="modal-nav">
      <button id="modal-prev" class="modal-nav-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span id="modal-counter"></span>
      <button id="modal-next" class="modal-nav-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
